name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck (frontend)
        run: npm run typecheck -w frontend
      - name: Build frontend
        run: npm run build:frontend
      - name: Test backend
        run: npm test -w backend
